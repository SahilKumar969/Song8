<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Spotify Now Playing - Premium Single Experience</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <!-- FontAwesome Icons for authentic Spotify controls -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        spotify: {
                            green: '#1DB954',
                            lightgreen: '#1ed760',
                            black: '#121212',
                            dark: '#040404',
                            card: '#181818',
                            hover: '#282828',
                            textMuted: '#b3b3b3',
                            border: '#2a2a2a'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar matching Spotify web client */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Smooth glowing background transitions */
        .ambient-bg {
            transition: background 1.5s ease;
        }

        /* Custom slider progress styling to mimic Spotify active bar */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: #4d4d4d;
            height: 4px;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.1s ease;
        }
        input[type="range"]:hover::-webkit-slider-thumb {
            opacity: 1;
        }
        input[type="range"]:hover {
            background: #1DB954;
        }

        /* Lyric scroll animation utilities */
        .lyric-line {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: left center;
        }
        .lyric-line.active {
            color: #ffffff;
            font-weight: 700;
            transform: scale(1.05);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* Mobile-first responsive adjustments */
        @media (max-width: 768px) {
            .lyric-line {
                font-size: 0.9rem !important;
                padding: 0.4rem 0 !important;
            }
            #lyrics-container {
                padding-top: 0.5rem !important;
                padding-bottom: 0.5rem !important;
            }
            .mobile-stack {
                flex-direction: column !important;
                align-items: center !important;
            }
        }

        @media (max-width: 480px) {
            .lyric-line {
                font-size: 0.8rem !important;
                padding: 0.3rem 0 !important;
            }
            .player-controls-mobile {
                gap: 0.5rem !important;
            }
            .player-controls-mobile button {
                padding: 0.25rem !important;
            }
        }
    </style>
</head>

        const canvas = document.getElementById('visualizer-canvas');
        const ctx = canvas.getContext('2d');
        let visualizerAnimFrameId;

        // Setup resize handlers for dynamic canvas size
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Simulated spectrum bands
        let visualizerBars = [];
        const totalBars = 35;
        for (let i = 0; i < totalBars; i++) {
            visualizerBars.push({
                x: i,
                currentHeight: 0,
                targetHeight: 0,
                speed: 0.12 + Math.random() * 0.12
            });
        }

        // Draw Canvas Waveform
        function drawVisualizer() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = canvas.width / totalBars;

            for (let i = 0; i < totalBars; i++) {
                const bar = visualizerBars[i];
                if (isPlaying) {
                    if (Math.random() < 0.18) {
                        bar.targetHeight = Math.random() * (canvas.height * 0.82);
                    }
                } else {
                    bar.targetHeight = Math.sin(Date.now() * 0.0035 + i * 0.25) * (canvas.height * 0.12) + (canvas.height * 0.04);
                }

                bar.currentHeight += (bar.targetHeight - bar.currentHeight) * bar.speed;
                const xPos = i * barWidth;
                const yPos = canvas.height - bar.currentHeight;

                const grad = ctx.createLinearGradient(xPos, canvas.height, xPos, yPos);
                grad.addColorStop(0, '#1DB954');
                grad.addColorStop(1, '#1ed760');

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(xPos + 2, yPos, barWidth - 4, bar.currentHeight, 2.5);
                ctx.fill();
            }

            visualizerAnimFrameId = requestAnimationFrame(drawVisualizer);
        }

        // Load Active Track details
        function loadTrack(track) {
            audio.src = track.audioUrl;
            trackTitle.textContent = track.title;
            trackArtist.textContent = track.artist;
            currentAlbumTitle.textContent = track.album;
            if (mobileAlbumTitle) mobileAlbumTitle.textContent = track.album;
            
            // Set cover images
            trackCover.src = track.cover;
            miniThumb.src = track.cover;
            miniThumbMobile.src = track.cover;
            miniTitle.textContent = track.title;
            miniTitleMobile.textContent = track.title;
            miniArtist.textContent = track.artist;
            miniArtistMobile.textContent = track.artist;

            // Adjust dynamic theme ambient glow background
            backdrop.className =
                `ambient-bg absolute inset-0 bg-gradient-to-b ${track.themeColor || 'from-purple-950/50 via-spotify-black to-spotify-dark'} to-spotify-dark z-0 filter blur-3xl opacity-85 pointer-events-none`;

            renderLyrics(track.lyrics);
            activeLyricIndex = -1;

            // Reset player timelines
            progressBar.value = 0;
            currentTimeEl.textContent = "0:00";
            durationEl.textContent = "0:00";
        }

        // Render lyrics inside the side container
        function renderLyrics(lyrics) {
            lyricsContainer.innerHTML = '';
            if (!lyrics || lyrics.length === 0) {
                lyricsContainer.innerHTML =
                    `<p class="text-spotify-textMuted text-center mt-4 sm:mt-12 italic text-xs sm:text-base">Instrumental - No Lyrics Available</p>`;
                return;
            }

            lyrics.forEach((lyric, index) => {
                const p = document.createElement('p');
                p.id = `lyric-${index}`;
                p.className = 'lyric-line text-sm sm:text-lg md:text-xl font-semibold text-spotify-textMuted/30 text-left py-0.5 sm:py-1.5 cursor-pointer hover:text-white/80';
                p.textContent = lyric.text;

                // Allow jumping directly to timeline lyric point
                p.onclick = () => {
                    audio.currentTime = lyric.time;
                    if (!isPlaying) togglePlay();
                };

                lyricsContainer.appendChild(p);
            });
        }

        // Synchronize scrolling and active state of lyrics with song playback
        function updateLyricsSync() {
            if (!trackDetails.lyrics || trackDetails.lyrics.length === 0) return;

            const time = audio.currentTime;
            let activeIdx = -1;

            for (let i = 0; i < trackDetails.lyrics.length; i++) {
                if (time >= trackDetails.lyrics[i].time) {
                    activeIdx = i;
                } else {
                    break;
                }
            }

            if (activeIdx !== activeLyricIndex && activeIdx !== -1) {
                if (activeLyricIndex !== -1) {
                    const prevEl = document.getElementById(`lyric-${activeLyricIndex}`);
                    if (prevEl) {
                        prevEl.classList.remove('active', 'text-white');
                        prevEl.classList.add('text-spotify-textMuted/30');
                    }
                }

                activeLyricIndex = activeIdx;
                const activeEl = document.getElementById(`lyric-${activeLyricIndex}`);
                if (activeEl) {
                    activeEl.classList.add('active');
                    activeEl.classList.remove('text-spotify-textMuted/30');

                    const containerHeight = lyricsContainer.clientHeight;
                    const elOffset = activeEl.offsetTop;
                    const elHeight = activeEl.clientHeight;

                    lyricsContainer.scrollTo({
                        top: elOffset - (containerHeight / 2) + (elHeight / 2),
                        behavior: 'smooth'
                    });
                }
            }
        }

        function scrollToActiveLyric() {
            if (activeLyricIndex !== -1) {
                const activeEl = document.getElementById(`lyric-${activeLyricIndex}`);
                if (activeEl) {
                    activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        // Play / Pause toggle mechanics
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play text-xs sm:text-sm ml-0.5"></i>';
                coverPlayIcon.className = "fas fa-play text-base sm:text-xl ml-0.5";
            } else {
                audio.play().then(() => {
                    isPlaying = true;
                    playBtn.innerHTML = '<i class="fas fa-pause text-xs sm:text-sm"></i>';
                    coverPlayIcon.className = "fas fa-pause text-base sm:text-xl";
                }).catch(e => {
                    showToast("Playback initialized: Tap to play!");
                });
            }
        }

        // Skip track time (+/- seconds)
        function skipTime(secs) {
            if (!audio.duration) return;
            let newTime = audio.currentTime + secs;
            if (newTime < 0) newTime = 0;
            if (newTime > audio.duration) newTime = audio.duration;
            audio.currentTime = newTime;
            showToast(`${secs > 0 ? 'Skipped forward' : 'Rewound'} ${Math.abs(secs)}s`);
        }

        // Audio seek progress update
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;

            const current = audio.currentTime;
            const total = audio.duration;
            const progress = (current / total) * 100;

            progressBar.value = progress;
            currentTimeEl.textContent = formatTime(current);
            durationEl.textContent = formatTime(total);

            updateLyricsSync();
        });

        // Set duration text when track is loaded
        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration || 0);
        });

        // Seek timeline function
        function seekAudio(percent) {
            if (!audio.duration) return;
            const seekTo = (percent / 100) * audio.duration;
            audio.currentTime = seekTo;
        }

        // Format raw seconds into beautiful digital representation (mm:ss)
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // Set system volume slider values
        function setVolume(value) {
            audio.volume = value / 100;
            if (value == 0) {
                muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
                if (muteBtnMobile) muteBtnMobile.innerHTML = '<i class="fas fa-volume-mute"></i>';
                isMuted = true;
            } else if (value < 50) {
                muteBtn.innerHTML = '<i class="fas fa-volume-down"></i>';
                if (muteBtnMobile) muteBtnMobile.innerHTML = '<i class="fas fa-volume-down"></i>';
                isMuted = false;
            } else {
                muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                if (muteBtnMobile) muteBtnMobile.innerHTML = '<i class="fas fa-volume-up"></i>';
                isMuted = false;
            }
        }

        // Fast mute buttons functionality
        function toggleMute() {
            if (isMuted) {
                audio.volume = 0.8;
                volumeSlider.value = 80;
                muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                if (muteBtnMobile) muteBtnMobile.innerHTML = '<i class="fas fa-volume-up"></i>';
                isMuted = false;
            } else {
                audio.volume = 0;
                volumeSlider.value = 0;
                muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
                if (muteBtnMobile) muteBtnMobile.innerHTML = '<i class="fas fa-volume-mute"></i>';
                isMuted = true;
            }
        }

        // Toggle heart like state - desktop
        function toggleLike() {
            userLiked = !userLiked;
            if (userLiked) {
                likeBtn.innerHTML = '<i class="fas fa-heart text-spotify-green text-base sm:text-lg animate-bounce"></i>';
                likeBtn.classList.remove('text-spotify-textMuted');
                if (likeBtnMobile) {
                    likeBtnMobile.innerHTML = '<i class="fas fa-heart text-spotify-green"></i>';
                    likeBtnMobile.classList.remove('text-spotify-textMuted');
                }
                showToast("Added to Your Library!");
            } else {
                likeBtn.innerHTML = '<i class="far fa-heart"></i>';
                likeBtn.classList.add('text-spotify-textMuted');
                if (likeBtnMobile) {
                    likeBtnMobile.innerHTML = '<i class="far fa-heart"></i>';
                    likeBtnMobile.classList.add('text-spotify-textMuted');
                }
                showToast("Removed from Your Library");
            }
        }

        // Toggle heart like state - mobile
        function toggleLikeMobile() {
            toggleLike();
        }

        // Custom loop repeat behaviors
        function toggleRepeat() {
            isRepeat = !isRepeat;
            if (isRepeat) {
                repeatBtn.classList.add('text-spotify-green');
                repeatBtn.classList.remove('text-spotify-textMuted');
                audio.loop = true;
                showToast("Single repeat enabled");
            } else {
                repeatBtn.classList.remove('text-spotify-green');
                repeatBtn.classList.add('text-spotify-textMuted');
                audio.loop = false;
                showToast("Single repeat disabled");
            }
        }

        // Custom shuffle indicators
        function toggleShuffle() {
            isShuffle = !isShuffle;
            if (isShuffle) {
                shuffleBtn.classList.add('text-spotify-green');
                shuffleBtn.classList.remove('text-spotify-textMuted');
                showToast("Intro loop preview active");
            } else {
                shuffleBtn.classList.remove('text-spotify-green');
                shuffleBtn.classList.add('text-spotify-textMuted');
                showToast("Intro loop preview inactive");
            }
        }

        // Auto trigger next loop track at completion loop bounds
        audio.addEventListener('ended', () => {
            if (isShuffle) {
                audio.currentTime = 0;
                audio.play();
            } else if (!isRepeat) {
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play text-xs sm:text-sm ml-0.5"></i>';
                coverPlayIcon.className = "fas fa-play text-base sm:text-xl ml-0.5";
            }
        });

        // Custom toast popups
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            toast.style.opacity = '1';

            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2500);
        }

        // Copy release details to clipboard
        function shareTrack() {
            const textarea = document.createElement('textarea');
            textarea.value =
                `Now listening to "${trackDetails.title}" by ${trackDetails.artist} on Spotify! Stream it here: ${trackDetails.spotifyUrl}`;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast("Share message copied to clipboard!");
            } catch (err) {
                showToast("Unable to copy share message!");
            }
            document.body.removeChild(textarea);
        }

        window.onload = function() {
            audio.volume = 0.8;
            loadTrack(trackDetails);
            drawVisualizer();
            
            // Set initial volume icon
            setVolume(80);
        };
    </script>
</body>
</html>
